[build]
  command = "npm run build -- --no-turbopack"
  publish = ".next"

# Essential Next.js plugin for Netlify (handles routing automatically)
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Node version compatible with Next.js 16
  NODE_VERSION = "20"
  # Force webpack — Turbopack skips nft trace files required by @netlify/plugin-nextjs
  NEXT_TURBOPACK = "0"

# Headers for security and large file uploads
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
